  <!-- ✅ Stripe / Apple Pay Script -->
   <script>
  function getCart() {
    try {
      return JSON.parse(localStorage.getItem("cart")) || [];
    } catch {
      return [];
    }
  }

  function calcCartTotal(cart) {
    // cart item should have price + quantity
    return cart.reduce((sum, item) => {
      const price = Number(item.price || 0);
      const qty = Number(item.quantity || 1);
      return sum + (price * qty);
    }, 0);
  }

  const cart = getCart();
  const total = calcCartTotal(cart);

  // Show summary
  const summaryEl = document.getElementById("cart-summary");
  if (summaryEl) {
    summaryEl.textContent = `Total: $${total.toFixed(2)} for ${cart.length} item(s).`;
  }

  // Store total for other scripts
  const totalEl = document.getElementById("cart-total");
  if (totalEl) {
    totalEl.textContent = total.toFixed(2);
  }
</script>

<script>
  const CART_KEY = "vansima_cart_v1";

  function getCartTotal() {
    const cart = JSON.parse(localStorage.getItem(CART_KEY) || "[]");

    const total = cart.reduce((sum, item) => {
      const price = Number(item.price) || 0;
      const qty = Number(item.qty ?? item.quantity ?? 1); // supports qty OR quantity
      return sum + price * qty;
    }, 0);

    return Number(total.toFixed(2));
  }

  // ✅ Render PayPal Buttons (Apple Pay shows automatically when eligible)
  paypal
    .Buttons({
      style: {
        layout: "vertical",
        color: "gold",
        shape: "rect",
        label: "paypal",
      },

      createOrder: (data, actions) => {
        const total = getCartTotal();

        if (!total || total <= 0) {
          alert("Your cart is empty. Please add items before checkout.");
          return;
        }

        return actions.order.create({
          purchase_units: [
            {
              amount: {
                value: total.toFixed(2), // ✅ dynamic total
              },
            },
          ],
        });
      },

      onApprove: (data, actions) => {
        return actions.order.capture().then((details) => {

</script>

  <!-- ✅ Simple cart display -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const CART_KEY = "vansima_cart_v1";
      try {
        const cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
        if (cart.length === 0) {
          document.getElementById("cart-summary").textContent = "Your cart is empty.";
          return;
        }

        let total = 0;
        cart.forEach((item) => {
          const price = parseFloat(item.price) || 0;
          const qty = parseInt(item.qty) || 1;
          total += price * qty;
        });

        document.getElementById("cart-summary").textContent =
          `Total: $${total.toFixed(2)} for ${cart.length} item(s).`;
      } catch (err) {
        console.error("Cart load error:", err);
      }
    });
  </script>
